<div>
    <form [formGroup]="myForm" novalidate (submit)="getUser()">
        <div>
            <label>Nome do Usuário</label><br/>
            <input placeholder="Digite o nome aqui" formControlName="userName"/>
            <br/><br/>
            <button type="submit" [disabled]="myForm.invalid">Enviar</button>
        </div>
    </form>
    <br/>
    <div *ngIf="user != ''">
        <h2>Usuário do GitHub</h2>
        <pre>{{user}}</pre>
    </div>
</div>
